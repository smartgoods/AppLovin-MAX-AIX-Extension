name: Build AIX Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your extension repo
        uses: actions/checkout@v4
        with:
          path: extension

      - name: Checkout App Inventor sources
        uses: actions/checkout@v4
        with:
          repository: mit-cml/appinventor-sources
          path: appinventor-sources

      - name: Copy extension Java source
        run: |
          mkdir -p appinventor-sources/appinventor/components/src/com/haroon/applovinmax
          cp extension/src/com/haroon/applovinmax/AppLovinMax.java appinventor-sources/appinventor/components/src/com/haroon/applovinmax/

      - name: Extract AppLovin SDK JAR from AAR
        run: |
          mkdir -p temp_applovin
          unzip -o extension/libs/applovin-sdk.aar -d temp_applovin

          echo "Checking AppLovin classes..."
          jar tf temp_applovin/classes.jar | grep "com/applovin/sdk/AppLovinSdk.class"

          mkdir -p appinventor-sources/appinventor/components/lib
          mkdir -p appinventor-sources/appinventor/components/deps

          cp temp_applovin/classes.jar appinventor-sources/appinventor/components/lib/applovin-sdk.jar
          cp temp_applovin/classes.jar appinventor-sources/appinventor/components/deps/applovin-sdk.jar

      - name: Build extension
        run: |
          cd appinventor-sources/appinventor
          ant extensions

      - name: Find AIX files
        run: |
          find appinventor-sources -name "*.aix" -type f

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppLovinMaxExtension
          path: appinventor-sources/**/*.aix
